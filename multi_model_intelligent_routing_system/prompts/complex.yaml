    2. Compliance & Privacy: Data sovereignty (GDPR/HIPAA), self-hosting demands, and audit logging needs.
    3. Latency Impact: Analyzing authorization checks on critical hot path API endpoints (sub-5ms SLA).

- id: T3_040
  tier: complex
  category: sql_generation
  expected_model: gpt-4o
  prompt: |
    Write optimized SQL queries for analyzing churn rate and customer lifetime value (LTV) in a SaaS subscription system.

    Schema: `subscriptions(id, user_id, plan_id, start_date, end_date, monthly_price, status)`

    Tasks:
    1. Calculate monthly recurring revenue (MRR) for each month over the past 2 years, broken down into New MRR, Expansion MRR, Contraction MRR, and Churned MRR.
    2. Write a query calculating 30-day cohort retention rates using window functions and CTEs.

- id: T3_041
  tier: complex
  category: system_design
  expected_model: gpt-4o
  prompt: |
    Design a distributed, fault-tolerant job scheduler (like Cron or Quartz) that processes millions of scheduled tasks per minute across a cluster of nodes.

    1. Task Execution Guarantees: At-least-once vs. Exactly-once execution, delayed task execution, and handling node crashes mid-task.
    2. Data Partitioning & Storage: Ring buffer / Hashed Wheel Timer data structures, persistence strategies using database indexing or distributed logs.
    3. Scalability: High concurrency handling, dynamic cluster membership, rebalancing scheduled jobs, and leader election protocols (Raft/Zookeeper).

- id: T3_042
  tier: complex
  category: code_review
  expected_model: gpt-4o
  prompt: |
    Perform a security and performance review of the following Rust code handling raw binary parsing:

    ```rust
