version: "1.0"

prompts:
- id: T2_001
  tier: moderate
  category: summarization
  expected_model: llama3
  prompt: |
    Summarize the following engineering meeting notes into exactly five concise, actionable bullet points focused on key decisions, risk mitigations, and execution phases.

    Meeting Notes:
    "The engineering team agreed to migrate backend services gradually over a 3-month timeline. We will prioritize improving Prometheus/Grafana observability upfront, strictly document automated rollback procedures for every release, and mandate end-to-end integration testing before releasing to production environments."

- id: T2_002
  tier: moderate
  category: classification
  expected_model: llama3
  prompt: |
    Classify the following customer query into one primary category and up to two secondary sub-categories. Provide a brief explanation for your choices.

    Categories: [Billing, Technical Support, Sales, Account Management]

    Text: "I was charged twice for my premium tier subscription this month after attempting to upgrade my account. Can someone refund the extra payment and verify my current access tier?"

- id: T2_003
  tier: moderate
  category: sentiment_analysis
  expected_model: llama3
  prompt: |
    Perform a granular sentiment analysis on the user review below. Break down the feedback into overall sentiment (Positive/Negative/Mixed/Neutral), aspect-based sentiment for each mentioned feature, and assign a confidence score ($0.0$ to $1.0$).

    Review: "The new UI design and speed are absolutely fantastic, but the recent app update broken offline sync completely, causing me to lose work. Support was helpful though."

- id: T2_004
  tier: moderate
  category: structured_analysis
  expected_model: llama3
  prompt: |
    Extract key performance indicators from the financial text below and output valid JSON matching this schema:
    `{"metrics": [{"name": string, "change_percentage": float, "trend": "positive"|"negative"}]}`

    Quarterly Report:
    "Q3 results showed strong top-line momentum with revenue expanding by 12.5% YoY, while operating expenses were contained to a 4.2% increase. Strategic customer success initiatives helped reduce monthly churn by 2.8%."

- id: T2_005
  tier: moderate
  category: comparison
  expected_model: llama3
  prompt: |
    Compare the security posture, operational overhead, and user friction implications of the two password policy specifications below.

    Specification A: "Passwords must be at least 8 characters in length and updated every 90 days."
    Specification B: "Passwords must be at least 14 characters, check against compromised password lists (HaveIBeenPwned API), and mandate 2FA without forced periodic expiration."

- id: T2_006
  tier: moderate
  category: requirement_extraction
  expected_model: llama3
  prompt: |
    Analyze the project spec below and extract requirements into two categorized lists: Functional Requirements (system behaviors) and Non-Functional Requirements (security, performance, usability).

    Specification:
    "Develop a cross-platform mobile banking application enabling users to log in using biometric authentication (FaceID/Fingerprint), view account balances offline, transfer funds, and guarantee end-to-end payload encryption with sub-200ms API response times."

- id: T2_007
  tier: moderate
  category: resume_analysis
  expected_model: llama3
  prompt: |
    Evaluate the candidate summary below for a Lead DevOps/SRE position. Highlight key strengths, potential skill gaps relative to high-scale infrastructure, and suggest 3 technical interview questions.

    Candidate Profile:
    "Senior Software Engineer with 5 years of hands-on experience utilizing Python, FastAPI, AWS core services, Docker containerization, and basic Kubernetes deployment management."

- id: T2_008
  tier: moderate
  category: risk_analysis
  expected_model: llama3
  prompt: |
    Identify potential project risks from the scenario below. Categorize each risk by Impact (High/Medium/Low) and Probability (High/Medium/Low), and provide a concrete mitigation strategy for each.

    Scenario:
    "A mission-critical core platform migration relies on a single third-party vendor software, grants a tight 2-week testing window prior to Black Friday traffic spikes, and lacks a documented rollback strategy."

- id: T2_009
  tier: moderate
  category: review_analysis
  expected_model: llama3
  prompt: |
    Synthesize the customer feedback highlights below into common user themes. Create an actionable roadmap with prioritized fixes for the product team.

    Feedback Summary:
    "Users frequently praise the fast query engine and responsive support team. However, widespread complaints cite a steep UI learning curve, confusing navigation menus, and intermittent mobile app crashes during background file sync."

- id: T2_010
  tier: moderate
  category: topic_classification
  expected_model: llama3
  prompt: |
    Classify the given technical excerpt into its primary business/engineering domain (e.g., Cloud Infrastructure, Data Engineering, Application Security, IT Governance) and tag key technology keywords.

    Excerpt:
    "We configured automated Kubernetes cluster autoscaling, established GitOps CI/CD pipelines via ArgoCD, enabled OpenTelemetry observability, and enforced infrastructure compliance using Terraform policies."

- id: T2_011
  tier: moderate
  category: summarization
  expected_model: llama3
  prompt: |
    Summarize the key architectural decisions from the team meeting notes below for an executive engineering dashboard.

    Notes:
    "The team agreed to adopt an asynchronous event-driven pattern using Apache Kafka to decouple order processing from inventory updates. Legacy REST polling will be deprecated by Q4."

- id: T2_012
  tier: moderate
  category: classification
  expected_model: llama3
  prompt: |
    Categorize the incoming IT service desk ticket into Priority (P1-Critical to P4-Low) and Assignment Group (Database, Networking, Frontend, Security).

    Ticket: "Users across the EU region are unable to log in; the authentication service throws HTTP 504 gateway timeout errors continuously."

- id: T2_013
  tier: moderate
  category: sentiment_analysis
  expected_model: llama3
  prompt: |
    Analyze the sentiment shift in this user account cancellation survey. Identify the primary driver of churn and user emotional tone.

    Survey Response: "I loved using this tool for the first six months. However, recent price hikes combined with unresolved bugs in export features made it impossible to justify the cost."

- id: T2_014
  tier: moderate
  category: structured_analysis
  expected_model: llama3
  prompt: |
    Convert the technical incident report below into a structured JSON object containing `incident_id`, `affected_services`, `root_cause`, `downtime_minutes`, and `action_items`.

    Report: "Incident #4092: Checkout pipeline degraded for 45 minutes due to database connection pool exhaustion caused by an unindexed query in the discount verification service. Action item: add composite index and scale connection pool limits."

- id: T2_015
  tier: moderate
  category: comparison
  expected_model: llama3
  prompt: |
    Compare REST API architecture vs. GraphQL for a mobile application development context. Detail differences in network bandwidth efficiency, client fetching flexibility, and caching implementation complexity.

- id: T2_016
  tier: moderate
  category: requirement_extraction
  expected_model: llama3
  prompt: |
    Extract business rules and data validation logic from the policy text below.

    Policy: "Orders exceeding $500 require manual manager approval unless placed by a Verified Enterprise Customer. Discount codes cannot be stacked with seasonal promotional pricing."

- id: T2_017
  tier: moderate
  category: resume_analysis
  expected_model: llama3
  prompt: |
    Review this resume extract for a Senior Frontend Developer position and rate technical alignment (1-10) against modern React/TypeScript best practices.

    Extract: "4 years experience building web applications using jQuery, Bootstrap, Vanilla JavaScript, CSS Modules, and basic React class components."

