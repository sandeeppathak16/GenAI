version: "1.0"

prompts:
- id: T3_001
  tier: complex
  category: system_design
  expected_model: gpt-4o
  prompt: |
    Design a highly available, globally distributed URL shortening service capable of handling 100 million write requests and 2 billion read requests per day with sub-50ms read latency.

    Your design must address:
    1. Key Generation Strategy: Base62 vs. MD5/SHA-256 vs. Pre-allocated Range-based Key Generators (Zookeeper). Prevent collisions under high concurrency.
    2. Storage Architecture: Multi-region database selection (SQL vs. NoSQL), indexing strategy, and partitioning/sharding scheme.
    3. Caching & CDN Strategy: Cache eviction policy (LRU vs. LFU) to maintain high cache hit rates for viral links.
    4. Rate Limiting & Security: Protection against malicious link generation, DDoS, and crawler scraping.
    5. Analytics Engine: Real-time click analytics stream processing pipeline without impacting write throughput.

- id: T3_002
  tier: complex
  category: code_review
  expected_model: gpt-4o
  prompt: |
    Perform a comprehensive code review of the following Python function:

    ```python
    def find_duplicates(nums):
        result=[]
        for i in nums:
            if nums.count(i)>1:
                result.append(i)
        return result
    ```

    1. Identify all correctness issues (e.g., handling duplicate entries in output, type safety, empty input).
    2. Analyze Big-O time and space complexity, highlighting performance bottlenecks on large input arrays ($N > 10^5$).
    3. Provide a refactored implementation using optimal data structures ($O(N)$ time complexity) while maintaining original element ordering or returning unique duplicate values.
    4. Highlight PEP 8 styling, type hints, and write unit tests covering edge cases.

- id: T3_003
  tier: complex
  category: debugging
  expected_model: gpt-4o
  prompt: |
    Diagnose and resolve the following production incident in a Python FastAPI application backed by PostgreSQL (SQLAlchemy + AsyncPG):

    Symptom: Under load test (>100 concurrent requests), the API returns HTTP 500 status codes. Application logs indicate intermittent `asyncpg.exceptions.TooManyConnectionsError` and `sqlalchemy.exc.TimeoutError: QueuePool limit of size 5 overflow 10 reached`.

    1. Root Cause Analysis: Explain how connection pool starvation and blocking synchronous code within async endpoint handlers cause database timeouts.
    2. Architectural Remediation: Provide concrete code snippets showing optimal connection pool sizing, PgBouncer integration strategy, and properly written async endpoint code.
    3. Observability Strategy: List specific Prometheus/Grafana metrics to track for early warning signals before HTTP 500 cascading failures occur.

- id: T3_004
  tier: complex
  category: architecture
  expected_model: gpt-4o
  prompt: |
    Architect an event-driven, microservices-based e-commerce platform processing 10,000 requests per second across Orders, Payments, Inventory, and Notifications services.

    1. Data Consistency: Detailed explanation of the Saga Pattern (Choreography vs. Orchestration) to handle cross-service distributed transactions and rollback logic during payment failure.
    2. Event Backbone: Apache Kafka/RabbitMQ schema registry, dead-letter queues (DLQ), and idempotent event consumers.
    3. Outbox Pattern: Implementation details of Transactional Outbox to guarantee event delivery without dual-write race conditions.
    4. Disaster Recovery: Multi-region failover strategy, database replication, and handling out-of-order event consumption.

- id: T3_005
  tier: complex
  category: algorithm_design
  expected_model: gpt-4o
  prompt: |
    Design an efficient algorithm to process 1 billion log records stored across distributed S3 files (total size ~100 GB) and extract the top 100 most frequent IPv4 addresses using bounded memory (max 2 GB RAM).

    1. Detail a two-phase MapReduce / External Merge Sort / Count-Min Sketch / Min-Heap approach.
    2. Provide full pseudocode or Python code for both stream-processing (approximate count using heavy hitters) and exact parallel computing methods.
    3. Analyze time complexity, space complexity, and network I/O bottlenecks.
    4. Explain how to handle skewness in data distribution (e.g., massive traffic spikes from a single IP).

- id: T3_006
  tier: complex
  category: root_cause_analysis
  expected_model: gpt-4o
  prompt: |
    Investigate the following incident report and establish a fault tree analysis:

    Incident: Immediately following a rolling deployment of a Node.js microservice, p99 API latency increased from 40ms to 850ms, and container CPU usage rose by 80%. Database metrics (connection count, query latency, CPU) remained nominal. Memory usage shows a steady step-up staircase pattern without garbage collection drops.

    1. Hypothesis Generation: Detail 3 high-probability root causes (e.g., event loop blocking due to synchronous JSON parsing/regex evaluation, memory leaks retaining context references, inefficient micro-task queue saturation).
    2. Diagnostic Methodology: Specify exact CLI tools (`perf`, `node --prof`, heap dumps, Flame graphs) and telemetry commands required to isolate the issue.
    3. Remediation Plan: Immediate mitigation steps (rollback/traffic shifting) and long-term architectural code-level prevention strategies.

- id: T3_007
  tier: complex
  category: planning
  expected_model: gpt-4o
  prompt: |
    Formulate an enterprise-grade, 6-month migration plan to transition a monolithic legacy Python (Django) application with a shared PostgreSQL database into domain-driven microservices.

    1. Domain Bounded Context Identification: Strategy for decoupling core domains using the Strangler Fig Pattern.
    2. Database Deconstruction: Strategy for breaking shared database tables into database-per-service without disrupting live production traffic (Change Data Capture / Debezium).
    3. Phase-by-Phase Roadmap: Gantt-style breakdown across 6 months including CI/CD pipeline setup, API Gateway routing (Kong/Envoy), and feature flagging.
    4. Risk Matrix: Top 5 technical risks with severity, likelihood, and mitigation steps.

- id: T3_008
  tier: complex
  category: creative_generation
  expected_model: gpt-4o
  prompt: |
    Write a hard science-fiction narrative centered around an autonomous spacecraft stranded in deep space due to a subtle race condition in its real-time operating system (RTOS) firmware during a thruster burn.

    1. Technical Rigor: Seamlessly integrate authentic computer science concepts—such as priority inversion, deadlocks, corrupted memory pointers, POSIX mutex locks, or watchdog timers.
    2. Narrative Arc: Show the dialogue between the vessel's embedded AI debugging agent and the human flight engineer as they inspect core dumps and thread stack traces under time-critical conditions before orbital decay.
    3. Climax & Resolution: Solved via a hot-patched kernel module or patch injected while maintaining safe system state.

- id: T3_009
  tier: complex
  category: decision_making
  expected_model: gpt-4o
  prompt: |
    Conduct an architectural trade-off evaluation comparing PostgreSQL, MongoDB, and Apache Cassandra for a globally scaled real-time messaging application with 500 million monthly active users.

    1. Data Model & Schema Evolution: Handling nested messages, thread structures, and user profiles.
    2. Scalability & Partitioning: Horizontal scaling capabilities, write throughput, auto-sharding vs. ring topology.
    3. Consistency Guarantees: CAP theorem positioning, tunable consistency levels (e.g., Read/Write QUORUM vs. ACID compliance).
    4. Operational Overhead: Maintenance complexity, multi-region replication, backup/restore procedures.
    5. Final Recommendation: Provide a hybrid storage architecture recommendation.

- id: T3_010
  tier: complex
  category: sql_generation
  expected_model: gpt-4o
  prompt: |
    Write production-grade, optimized PostgreSQL queries for a complex analytical requirement.

    Schema:
    - customers(id BIGINT PRIMARY KEY, name VARCHAR(255), created_at TIMESTAMP, region VARCHAR(50))
    - orders(id BIGINT PRIMARY KEY, customer_id BIGINT REFERENCES customers(id), total NUMERIC(10,2), order_date TIMESTAMP, status VARCHAR(20))
    - order_items(id BIGINT PRIMARY KEY, order_id BIGINT REFERENCES orders(id), product_id BIGINT, quantity INT, price NUMERIC(10,2))

    Tasks:
    1. Write an efficient query using Window Functions (`DENSE_RANK()`, `SUM() OVER`) to find the top 10 customers by total spend in each region for completed orders in 2025.
    2. Include query optimization techniques: composite indexing recommendations (`CREATE INDEX...`), explain execution plan considerations (`EXPLAIN ANALYZE`), and demonstrate how to avoid sequence scans on large datasets.
    3. Write a CTE-based recursive query to calculate month-over-month revenue growth rate per region.

- id: T3_011
  tier: complex
  category: system_design
  expected_model: gpt-4o
  prompt: |
    Design a distributed, highly scalable Notification System capable of delivering push notifications, SMS, and emails to over 500 million users worldwide.

    1. Delivery Guarantees: Ensure at-least-once delivery, deduplication strategies, and prioritization (e.g., OTP vs. Marketing emails).
    2. Provider Aggregation: Dynamic fallback routing between third-party providers (Twilio, SendGrid, FCM) during outages.
    3. User Preference Engine: Low-latency evaluation of user quiet hours, channel preferences, and rate limits.
    4. Scalability Architecture: Queue partitioning, worker pool autoscaling, and handling sudden batch spikes.

- id: T3_012
  tier: complex
  category: code_review
  expected_model: gpt-4o
  prompt: |
    Review the following Java code for a thread-safe singleton cache implementation:

    ```java
    public class CacheManager {
        private static CacheManager instance;
        private Map<String, Object> cache = new HashMap<>();

        private CacheManager() {}

        public static CacheManager getInstance() {
            if (instance == null) {
                instance = new CacheManager();
            }
            return instance;
        }

        public void put(String key, Object val) { cache.put(key, val); }
        public Object get(String key) { return cache.get(key); }
    }
    ```

    1. Identify all concurrency bugs, memory visibility issues, and race conditions under multithreaded environments.
    2. Explain double-checked locking patterns, `volatile` keywords, or initialization-on-demand holder idiom solutions.
    3. Provide a production-ready refactored version using `ConcurrentHashMap` and thread-safe idioms.

- id: T3_013
  tier: complex
  category: debugging
  expected_model: gpt-4o
  prompt: |
    Debug a memory leak issue in a production Kubernetes cluster running Java Spring Boot services. Containers are continuously killed by the OOMKiller (Exit Code 137).

    1. Explain the difference between JVM Heap memory and Metaspace/Native memory limits in Docker containers.
    2. Detail how parameters like `-XX:MaxRAMPercentage`, off-heap native memory allocations (e.g., Netty Direct Memory), and thread thread-stack allocation contribute to container OOM.
    3. Provide a step-by-step troubleshooting workflow using tools like `jcmd`, `jmap`, `gdb`, and Prometheus container metrics (`container_memory_working_set_bytes`).

- id: T3_014
  tier: complex
  category: architecture
  expected_model: gpt-4o
  prompt: |
    Design a global multi-tenant SaaS authentication and access management platform (IAM) supporting OAuth2, OIDC, and SAML 2.0.

    1. Tenant Isolation: Architectural strategies for multi-tenant data partitioning (Row-Level Security vs. Schema per Tenant vs. DB per Tenant).
    2. Security & Compliance: Token issuance (JWT vs. Opaque Tokens), public key rotation (JWKS), and protection against token theft.
    3. Fine-Grained Authorization: Compare Role-Based Access Control (RBAC) vs. Attribute-Based Access Control (ABAC) vs. Relationship-Based Access Control (ReBAC like Google Zanzibar).

- id: T3_015
  tier: complex
  category: algorithm_design
  expected_model: gpt-4o
  prompt: |
    Design a distributed Rate Limiter service that enforces rate limits (e.g., 1,000 requests per minute per IP) across a cluster of 50 API Gateway instances.

    1. Algorithm Selection: Compare Token Bucket, Leaky Bucket, Fixed Window Counter, and Sliding Window Log algorithms.
    2. Distributed Synchronization: Evaluate Redis Lua scripts, Sliding Window Counters with atomic increments, and local memory caching with asynchronous sync.
    3. Edge Cases: Address clock drift across servers, race conditions, and graceful degradation during Redis cluster failures.

- id: T3_016
  tier: complex
  category: root_cause_analysis
  expected_model: gpt-4o
  prompt: |
    Perform a post-mortem root cause analysis on a major outage where a MySQL database primary node crashed due to running out of storage space.

    1. Root Cause Analysis: Trace the escalation from excessive binary logging, unoptimized temp tables during massive analytical queries, and lack of automated log truncation.
    2. Cascading Failures: Explain why read-replicas failed to promote cleanly due to replication lag and uncommitted long-running transactions.
    3. Preventative Action Plan: Outline disk alerting policies, automated log rotation, transaction timeouts, and failover automation (e.g., Orchestrator/Patroni).

- id: T3_017
  tier: complex
  category: planning
  expected_model: gpt-4o
  prompt: |
    Create a technical roadmap for implementing a Zero Trust Architecture (ZTA) across an enterprise network with legacy on-prem services and multi-cloud Kubernetes deployments.

    1. Core Pillars: Address Identity, Device Trust, Network Segmentation (Microsegmentation), and Continuous Verification.
    2. Service Mesh Integration: Plan for Istio/Linkerd mTLS implementation, SPIFFE/SPIRE identity attestation, and Envoy proxy sidecars.
    3. Phased Rollout Plan: Detail a 4-phase rollout strategy spanning 12 months with minimal disruption to internal developer workflows.

- id: T3_018
  tier: complex
  category: creative_generation
  expected_model: gpt-4o
  prompt: |
    Write an engaging technical blog post explaining the inner workings of B-Trees vs. LSM-Trees (Log-Structured Merge-trees) aimed at senior backend engineers.

    1. Visual & Conceptual Explanations: Explain write amplification, read amplification, space amplification, and compaction strategies (Leveled vs. Size-Tiered).
    2. Real-World Engines: Compare InnoDB/Postgres (B-Tree) with RocksDB/Cassandra (LSM-Tree) with benchmark trade-offs.
    3. Use Cases: Detail exact scenarios where a team should choose LSM over B-Tree or vice versa based on read/write workload profiles.

- id: T3_019
  tier: complex
  category: decision_making
  expected_model: gpt-4o
  prompt: |
    Evaluate Serverless Functions (AWS Lambda/GCP Cloud Functions) vs. Provisioned Containers (Kubernetes/EKS) for a unpredictable, bursty machine learning inference API.

    1. Cost Analysis: Mathematical cost comparison across various baseline vs. peak RPS patterns.
    2. Cold Start & Latency: Analysis of cold start initialization times, provisioning models, and GPU acceleration capabilities.
    3. Developer Experience & Ops: CI/CD integration, observability, local debugging complexity, and vendor lock-in risk.

- id: T3_020
  tier: complex
  category: sql_generation
  expected_model: gpt-4o
  prompt: |
    Write advanced SQL to perform fraud detection analysis on a financial transactions table: `transactions(id, user_id, amount, merchant_id, timestamp, location_lat, location_lon)`.

    1. Write a query to flag rapid consecutive transactions made by the same user in different geographical locations where the physical distance between locations is impossible to cover given the elapsed time (Velocity Check).
    2. Use PostgreSQL spatial functions (`ST_Distance`, `ST_MakePoint`) or Haversine formula CTEs combined with `LAG()` window functions.
    3. Optimize the query for processing tens of millions of records daily.

- id: T3_021
  tier: complex
  category: system_design
  expected_model: gpt-4o
  prompt: |
    Design a real-time collaborative document editor (like Google Docs or Figma) supporting thousands of concurrent users editing a single canvas/document.

    1. Concurrency Control: Compare Operational Transformation (OT) vs. Conflict-free Replicated Data Types (CRDTs).
    2. Networking Protocol: WebSockets vs. WebRTC vs. HTTP Long-Polling for low-latency delta synchronization.
    3. Persistence & Snapshotting: Archival strategy, version history maintenance, and restoring historical document states.
    4. Offline First Support: Client-side storage, conflict resolution upon reconnection, and network partition tolerance.

- id: T3_022
  tier: complex
  category: code_review
  expected_model: gpt-4o
  prompt: |
    Review the following C++ code snippet for safety, performance, and modern C++ best practices:

    ```cpp
    char* process_data(char* input, int length) {
        char* buffer = new char[1024];
        strcpy(buffer, input);
        for(int i = 0; i < length; i++) {
            if(buffer[i] == 'a') buffer[i] = 'z';
        }
        return buffer;
    }
    ```

    1. Identify all buffer overflow risks, memory leaks, raw pointer anti-patterns, and undefined behavior.
    2. Modernize the code to modern C++ (C++20) using `std::string_view`, `std::unique_ptr` or `std::string`, and standard algorithms.
    3. Discuss memory safety tools (AddressSanitizer, Valgrind) to catch these flaws during automated build pipelines.

- id: T3_023
  tier: complex
  category: debugging
  expected_model: gpt-4o
  prompt: |
    Troubleshoot a sudden high CPU usage spike in a Go microservice running in production.

    1. Profiling Workflow: Step-by-step instructions on utilizing `pprof` (CPU, goroutine, block profiles) on a live production instance.
    2. Common Go Pitfalls: Analyze how runaway goroutine leaks, busy-waiting loops, unnecessary memory allocations triggering aggressive GC pauses cause CPU starvation.
    3. Remediation: Provide corrected Go code demonstrating proper channel management, context cancellation (`context.WithTimeout`), and worker pool synchronization (`sync.WaitGroup`).

- id: T3_024
  tier: complex
  category: architecture
  expected_model: gpt-4o
  prompt: |
    Architect a scalable, enterprise-grade Data Lakehouse platform integrating transactional capabilities over raw object storage (S3/GCS).

    1. Tech Stack Selection: Compare Apache Hudi, Delta Lake, and Apache Iceberg for transactional consistency (ACID) over parquet files.
    2. Ingestion & Processing Pipeline: Real-time streaming (Apache Flink/Spark Streaming) vs. batch ETL pipelines.
    3. Query Engine Architecture: Trino/Presto/DuckDB routing layer for low-latency ad-hoc SQL queries and BI reporting.
    4. Data Governance: Role-Based Access Control (RBAC), data lineage, and automated schema evolution handling.

- id: T3_025
  tier: complex
  category: algorithm_design
  expected_model: gpt-4o
  prompt: |
    Design a spatial search algorithm and indexing structure to power a ride-sharing service (e.g., Uber) that matches riders with nearby drivers in sub-100ms.

    1. Spatial Indexing: Compare Geohash, Quadtrees, and Google S2 geometry libraries.
    2. Dynamic Updates: Strategy for updating driver locations occurring every 4 seconds without locking spatial index structures.
    3. Match Algorithm: Efficient $K$-Nearest Neighbors ($K$-NN) search algorithm combined with real-time routing distance estimates.

- id: T3_026
  tier: complex
  category: root_cause_analysis
  expected_model: gpt-4o
  prompt: |
    Conduct a root cause analysis for an enterprise incident involving a silent data corruption bug in an e-commerce order ledger.

    1. Context: Floating-point precision errors accumulated across millions of micro-transactions over 6 months, causing financial reconciliation imbalances.
    2. Analysis: Explain how using standard IEEE 754 floating-point types (`float`/`double`) instead of fixed-point/decimal representations (`DECIMAL`/`BigInteger`) causes rounding errors.
    3. Remediation: Data patching SQL scripts, database schema migration strategies, and continuous automated auditing tests.

- id: T3_027
  tier: complex
  category: planning
  expected_model: gpt-4o
  prompt: |
    Develop a Disaster Recovery (DR) and Business Continuity Plan (BCP) for a global fintech platform processing online credit card payments.

    1. Metric Targets: Define precise Recovery Time Objectives (RTO) and Recovery Point Objectives (RPO) for Tier 0 core services.
    2. Active-Active vs. Active-Passive Architectures: Multi-region setup across cloud providers with synchronous vs. asynchronous data replication.
    3. Chaos Engineering & Testing: Plan for regular GameDay execution using Chaos Mesh / Gremlin to simulate region dropouts and split-brain scenarios.

- id: T3_028
  tier: complex
  category: creative_generation
  expected_model: gpt-4o
  prompt: |
    Write a dramatic dialogue between an On-Call Site Reliability Engineer (SRE) and a Chief Technology Officer (CTO) during a cascading outage triggered by a BGP route leak.

    1. Technical Accuracy: Explain BGP path hijacking, route leaks, DNS failure modes, and edge router blackholing realistically.
    2. High-Stakes Atmosphere: Capture the tension, communication protocols (Incident Commander roles), and decision-making trade-offs (e.g., pulling the plug on major regions vs. waiting for ISP resolution).

- id: T3_029
  tier: complex
  category: decision_making
  expected_model: gpt-4o
  prompt: |
    Evaluate GraphQL vs. REST APIs vs. gRPC for an enterprise ecosystem with web, mobile, and internal microservice communication.

    1. Trade-off Matrix: Compare serialization efficiency (Protobuf vs. JSON), network overhead, schema enforcement, and developer tooling.
    2. Performance: Network transport (HTTP/1.1 vs. HTTP/2 vs. HTTP/3), streaming support, and multiplexing capabilities.
    3. Architectural Fit: Recommend the optimal protocol choice for each layer (Client-to-Backend vs. Service-to-Service).

- id: T3_030
  tier: complex
  category: sql_generation
  expected_model: gpt-4o
  prompt: |
    Write complex SQL queries for inventory allocation management under strict concurrency conditions.

    Schema:
    - inventory(product_id INT PRIMARY KEY, available_stock INT, reserved_stock INT)
    - reservations(id BIGINT PRIMARY KEY, user_id BIGINT, product_id INT, status VARCHAR(20), expires_at TIMESTAMP)

    Tasks:
    1. Write a thread-safe stored procedure/transactional SQL script using `SELECT ... FOR UPDATE` or optimistic locking (`WHERE version = x`) to reserve stock without race conditions.
    2. Write an automated cleanup query that cancels expired reservations and safely returns stock back to `available_stock`.

- id: T3_031
  tier: complex
  category: system_design
  expected_model: gpt-4o
  prompt: |
    Design a Video Streaming Infrastructure (like Netflix or YouTube) capable of adaptive bitrate streaming (ABR) for millions of concurrent viewers globally.

    1. Video Processing Pipeline: Transcoding workflow, codec selection (H.264, H.265/HEVC, AV1), and chunking (HLS / DASH protocols).
    2. Content Delivery Network (CDN): Cache hierarchy (Origin, Edge, Mid-tier), origin shield, and dynamic manifest manipulation.
    3. DRM & Security: Token authentication, widevine/fairplay digital rights management integration.

- id: T3_032
  tier: complex
  category: code_review
  expected_model: gpt-4o
  prompt: |
    Review the following JavaScript / TypeScript code for security vulnerabilities, specifically cross-site scripting (XSS) and state management bugs:

    ```typescript
    function RenderUserProfile({ userData }: { userData: any }) {
      return (
        <div className="profile">
          <h2>{userData.name}</h2>
          <div dangerouslySetInnerHTML={{ __html: userData.bio }} />
          <a href={userData.websiteUrl}>Website</a>
        </div>
      );
    }
    ```

    1. Identify all XSS injection vectors (`dangerouslySetInnerHTML`, unvalidated `href` javascript: schemes).
    2. Provide DOMPurify sanitization strategies and strict type definitions.
    3. Explain Content Security Policy (CSP) headers that mitigate these vulnerability vectors at the browser level.

- id: T3_033
  tier: complex
  category: debugging
  expected_model: gpt-4o
  prompt: |
    Investigate and fix an issue where a Kubernetes pod is stuck in `CrashLoopBackOff` with termination reason `OOMKilled`, but application logs show normal heap memory usage.

    1. Explain kernel-level cgroups (cgroups v1 vs v2) memory limits and how off-heap memory, thread stacks, or glibc memory fragmentation cause cgroup memory limits to trigger.
    2. Provide diagnostics commands using `kubectl describe`, `crictl`, `dmesg`, and inspecting `/sys/fs/cgroup/memory`.
    3. Suggest proper Kubernetes container resource requests and limits configurations.

- id: T3_034
  tier: complex
  category: architecture
  expected_model: gpt-4o
  prompt: |
    Architect an AI/ML Model Training & Deployment Platform capable of dynamically scaling training jobs across multi-node GPU clusters (NVIDIA A100/H100).

    1. Model Training Orchestration: Kubeflow / Ray / Slurm integration, distributed data-parallel (DDP) synchronization strategy.
    2. Feature Store Architecture: Real-time and batch feature ingestion (Feast) with low-latency serving layer.
    3. Model Serving Pipeline: Triton Inference Server / vLLM integration, dynamic batching, model quantization (INT8/FP16), and canary deployments.

- id: T3_035
  tier: complex
  category: algorithm_design
  expected_model: gpt-4o
  prompt: |
    Design an algorithm for an autocomplete/typeahead search system that handles millions of prefix lookup queries per second with sub-10ms response times.

    1. Data Structure Selection: Compare Trie, Radix Tree, and Ternary Search Tree with prefix frequency scores stored at nodes.
    2. Distributed Aggregations: Strategy for updating top-k trending search queries asynchronously using MapReduce and streaming algorithms.
    3. Memory Optimization: Techniques to compress Tries in memory and cache top completions at client edge nodes.

- id: T3_036
  tier: complex
  category: root_cause_analysis
  expected_model: gpt-4o
  prompt: |
    Analyze a post-mortem incident where an infrastructure-as-code (Terraform) change accidentally deleted a production database cluster during a routine deployment.

    1. Root Cause Analysis: Identify flaws in state management, missing deletion protection flags (`prevent_destroy`), and flawed CI/CD pipeline execution plans (`terraform apply` without lock checks).
    2. Operational Safety: Design modern IaC review guardrails (Conftest, OPA policies, Atlantis automation, IAM permission boundary separations).
    3. Disaster Recovery Execution: Evaluate the step-by-step restoration workflow from point-in-time snapshots and measure RPO impact.

- id: T3_037
  tier: complex
  category: planning
  expected_model: gpt-4o
  prompt: |
