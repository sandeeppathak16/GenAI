    2. Branching Decisions: Include decision trees for testing DNS resolution, inspecting iptables/eBPF rules, verifying TLS handshake certificates, and checking pod endpoint slices.

- id: T3_039
  tier: complex
  category: decision_making
  expected_model: gpt-4o
  prompt: |
    Evaluate building an in-house authorization framework vs. adopting an open-source solution (Opa / OpenFGA) vs. a SaaS vendor (Auth0 / Okta Fine-Grained Authorization).

