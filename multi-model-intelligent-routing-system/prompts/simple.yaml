version: "1.0"

prompts:
  - id: T1_001
    tier: simple
    category: extraction
    expected_model: gpt-4o-mini
    prompt: |
      Extract the following information from the email and return JSON.

      Email:
      Hello,

      My order #12345 hasn't arrived yet. Please deliver it tomorrow afternoon.

      Thanks,
      John

      Return:
      {
        "order_id": "",
        "issue": "",
        "requested_action": ""
      }

  - id: T1_002
    tier: simple
    category: formatting
    expected_model: gpt-4o-mini
    prompt: |
      Convert the following CSV into a markdown table.

      Name,Department,Experience
      Alice,Engineering,5
      Bob,Marketing,3
      Charlie,Sales,7

  - id: T1_003
    tier: simple
    category: qa
    expected_model: gpt-4o-mini
    prompt: |
      Answer the question using only the provided context.

      Context:
      Python was created by Guido van Rossum and first released in 1991.

      Question:
      Who created Python?

  - id: T1_004
    tier: simple
    category: translation
    expected_model: gpt-4o-mini
    prompt: |
      Translate the following sentence into French.

      "Good morning. I hope you're having a wonderful day."

  - id: T1_005
    tier: simple
    category: grammar
    expected_model: gpt-4o-mini
    prompt: |
      Correct the grammar of the following paragraph without changing its meaning.

      "He don't likes playing football because he have injured his knee."

  - id: T1_006
    tier: simple
    category: json_conversion
    expected_model: gpt-4o-mini
    prompt: |
      Convert the following employee information into JSON.

      Employee Name: Sarah
      Department: HR
      Employee ID: EMP-908
      Location: London

  - id: T1_007
    tier: simple
    category: entity_extraction
    expected_model: gpt-4o-mini
    prompt: |
      Extract all people, organizations, and locations from the following text.

      "Alice from Microsoft visited Google's office in New York with Bob."

      Return JSON.

  - id: T1_008
    tier: simple
    category: date_extraction
    expected_model: gpt-4o-mini
    prompt: |
      Extract all dates mentioned below and normalize them into YYYY-MM-DD format.

      "The project starts on August 5, 2026 and finishes on September 12, 2026."

  - id: T1_009
    tier: simple
    category: email_subject
    expected_model: gpt-4o-mini
    prompt: |
      Generate a concise email subject line for the following email.

      Hi Team,

      Our production deployment has been postponed until Friday because additional testing is required.

      Thanks.

  - id: T1_010
    tier: simple
    category: keyword_extraction
    expected_model: gpt-4o-mini
    prompt: |
      Extract the five most important keywords from the following paragraph.

      Artificial Intelligence is transforming industries by automating repetitive tasks,
      improving decision making through predictive analytics, and enabling more
      personalized customer experiences.

  - id: T1_011
    tier: simple
    category: extraction
    expected_model: gpt-4o-mini
    prompt: |
      Extract the invoice number, customer name, and total amount from the following invoice text.

      Invoice:
      Invoice No: INV-1011
      Customer: Customer 11
      Total: $111.50
      Due Date: 2026-08-12

  - id: T1_012
    tier: simple
    category: formatting
    expected_model: gpt-4o-mini
    prompt: |
      Convert the following bullet list into a markdown table.

      Name,Score
      Alice,82
      Bob,72
      Charlie,92

  - id: T1_013
    tier: simple
    category: qa
    expected_model: gpt-4o-mini
    prompt: |
      Context:
      The capital of Japan is Tokyo. Mount Fuji is the tallest mountain in Japan.

      Question:
      What is the capital of Japan?

  - id: T1_014
    tier: simple
    category: translation
    expected_model: gpt-4o-mini
    prompt: |
      Translate "Thank you for your assistance." into Spanish.
  - id: T1_015
    tier: simple
    category: grammar
    expected_model: gpt-4o-mini
    prompt: |
      Correct: "She dont know where are the keys."
