    2. Shift-Left Security Strategy: Developer tooling (IDE plugins, pre-commit hooks) and vulnerability triage workflows.
    3. Policy Enforcement: Automating breaking build rules, managing false positives, and tracking Mean Time To Remediate (MTTR) for high-severity CVEs.

- id: T3_038
  tier: complex
  category: creative_generation
  expected_model: gpt-4o
  prompt: |
